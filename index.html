<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clint AR Hologram - Official</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }

        /* Moves Google's "Start AR" button to the top so it's easy to click */
        #ARButton {
            top: 20px !important;
            bottom: auto !important;
            background: rgba(0, 255, 242, 0.3) !important;
            border: 2px solid #00fff2 !important;
            box-shadow: 0 0 10px #00fff2;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Keeps controls at the bottom */
            align-items: center;
            padding-bottom: 40px;
            z-index: 999;
            pointer-events: none;
        }

        #status-display {
            background: rgba(0, 0, 0, 0.8);
            color: #00fff2;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #00fff2;
            margin-bottom: 20px;
            pointer-events: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        #ui-layer input, #ui-layer button {
            pointer-events: auto; /* Makes them clickable */
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #00fff2;
            background: rgba(10, 10, 10, 0.9);
            color: white;
            width: 280px;
            max-width: 85%;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        #send-btn {
            background: #00fff2 !important;
            color: #000 !important;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="status-display">System: Ready. Tap "START AR" at the top</div>
        
        <div class="controls">
            <input type="text" id="user-input" placeholder="Type 'clint1' or 'clint2'">
            <button id="send-btn">Switch Character</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer, clintMesh;
        const loader = new THREE.TextureLoader();
        const statusEl = document.getElementById('status-display');

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Add the AR Button with Overlay
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ui-layer') }
            }));

            // Create the Hologram Surface
            const geometry = new THREE.PlaneGeometry(0.8, 1.2);
            const material = new THREE.MeshBasicMaterial({
                map: loader.load('clint1-founder-3.png'),
                transparent: true,
                side: THREE.DoubleSide
            });

            clintMesh = new THREE.Mesh(geometry, material);
            clintMesh.position.set(0, 0, -1.5); // Starts 1.5m away
            clintMesh.visible = false;
            scene.add(clintMesh);

            // Bright light so the image looks clear
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));

            const btn = document.getElementById('send-btn');
            const input = document.getElementById('user-input');

            // This function tries different filenames if one fails
            const tryLoad = (names, index) => {
                if (index >= names.length) {
                    statusEl.innerText = "Error: Clint2 image not found on GitHub!";
                    statusEl.style.color = "#ff4444";
                    return;
                }

                statusEl.innerText = "Loading: " + names[index] + "...";
                loader.load(names[index], 
                    (tex) => {
                        clintMesh.material.map = tex;
                        clintMesh.visible = true;
                        statusEl.innerText = "Success! Showing: " + names[index];
                        statusEl.style.color = "#00ff00";
                    },
                    undefined,
                    () => tryLoad(names, index + 1) // Try the next name variant
                );
            };

            btn.onclick = () => {
                const val = input.value.toLowerCase().trim();
                let filesToTry = [];
                
                if (val.includes('clint1')) {
                    filesToTry = ['clint1-founder-3.png', 'clint1.png'];
                } else if (val.includes('clint2')) {
                    // Tries multiple common names just in case
                    filesToTry = [
                        'clint2-founder-3.png', 
                        'Clint2-founder-3.png', 
                        'clint2-founder-3.PNG', 
                        'clint2.png'
                    ];
                }

                if (filesToTry.length > 0) {
                    tryLoad(filesToTry, 0);
                } else {
                    statusEl.innerText = "Enter 'clint1' or 'clint2'";
                }
            };

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
