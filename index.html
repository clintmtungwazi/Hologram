
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clint AI Hologram</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ARButton {
            top: 20px !important;
            bottom: auto !important;
            background: rgba(0, 255, 242, 0.4) !important;
            border: 2px solid #00fff2 !important;
        }
        #ui-layer {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            pointer-events: none;
        }
        #status-display {
            background: rgba(0, 0, 0, 0.8);
            color: #00fff2;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #00fff2;
        }
        .input-group {
            display: flex;
            gap: 5px;
            pointer-events: auto;
            width: 90%;
            max-width: 400px;
        }
        input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00fff2;
            background: #111;
            color: white;
        }
        button {
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: #00fff2;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="status-display">System Ready</div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Talk to Clint...">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer, clintMesh;
        const loader = new THREE.TextureLoader();
        const statusEl = document.getElementById('status-display');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ui-layer') }
            }));

            const geometry = new THREE.PlaneGeometry(0.8, 1.3);
            // DEFAULT LOAD (Founder)
            const material = new THREE.MeshBasicMaterial({
                map: loader.load('clint1-founder-3.png/Clint1-founder-3png_260329_122816.jpg'),
                transparent: true,
                side: THREE.DoubleSide
            });

            clintMesh = new THREE.Mesh(geometry, material);
            clintMesh.position.set(0, 0, -1.2);
            clintMesh.visible = true; 
            scene.add(clintMesh);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));

            btn.onclick = () => {
                const val = input.value.toLowerCase().trim();
                let searchList = [];

                if (val.includes('clint 1') || val.includes('founder')) {
                    searchList = ['clint1-founder-3.png/Clint1-founder-3png_260329_122816.jpg'];
                } else if (val.includes('clint 2') || val.includes('engineer')) {
                    searchList = ['clint2-engineer-3.png/clint2-engineer-3png_260329_122846.jpg'];
                }

                if (searchList.length > 0) {
                    tryLoad(searchList, 0);
                    processCommand(val);
                    input.value = "";
                } else {
                    processCommand(val);
                    input.value = "";
                }
            };

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });
        }

        const tryLoad = (names, index) => {
            if (index >= names.length) {
                statusEl.innerText = "Error: File Not Found!";
                statusEl.style.color = "#ff4444";
                return;
            }
            statusEl.innerText = "Connecting: " + names[index];
            loader.load(names[index], (tex) => {
                clintMesh.material.map = tex;
                clintMesh.visible = true;
                statusEl.innerText = "Hologram Active";
                statusEl.style.color = "#00ff00";
            }, undefined, () => tryLoad(names, index + 1));
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- CLINT'S BRAIN & VOICE ---
        let activeCharacter = 'clint1'; 

        function hologramSpeak(text) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const preferredVoices = voices.filter(v => v.lang.includes('en-US'));
            
            if (activeCharacter === 'clint1') {
                utterance.pitch = 0.85; 
                utterance.rate = 0.95;
                utterance.voice = preferredVoices.find(v => v.name.includes('Male')) || preferredVoices[0];
            } else {
                utterance.pitch = 1.15; 
                utterance.rate = 1.10;
                utterance.voice = preferredVoices.find(v => v.name.includes('2')) || preferredVoices[1];
            }
            window.speechSynthesis.speak(utterance);
        }

        function processCommand(text) {
            const msg = text.toLowerCase();
            if (msg.includes("clint 1") || msg.includes("founder")) {
                activeCharacter = 'clint1';
                hologramSpeak("Founder mode active. Standing by for project oversight.");
            } 
            else if (msg.includes("clint 2") || msg.includes("engineer")) {
                activeCharacter = 'clint2';
                hologramSpeak("Yo! Engineer Clint here. Let's get to work on the build.");
            } 
            else if (msg.includes("hello") || msg.includes("hi")) {
                hologramSpeak(activeCharacter === 'clint1' ? "Greetings. How can I assist?" : "What's up! Ready to code?");
            } else {
                hologramSpeak("I heard " + text);
            }
        }
    </script>
</body>
</html>
