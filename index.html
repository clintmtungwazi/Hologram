<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clint AR Hologram - Final Master</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* MOVES GOOGLE BUTTON TO TOP - SO YOU CAN ACTUALLY CLICK IT */
        #ARButton {
            top: 30px !important;
            bottom: auto !important;
            background: rgba(0, 255, 242, 0.4) !important;
            border: 2px solid #00fff2 !important;
            box-shadow: 0 0 20px #00fff2;
            font-weight: bold !important;
        }

        #ui-layer {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            pointer-events: none;
        }

        #status-display {
            background: rgba(0, 0, 0, 0.85);
            color: #00fff2;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid #00fff2;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
            width: 85%;
            max-width: 320px;
        }

        input {
            padding: 16px;
            border-radius: 15px;
            border: 2px solid #00fff2;
            background: rgba(15, 15, 15, 0.95);
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        #send-btn {
            padding: 16px;
            border-radius: 15px;
            border: none;
            background: #00fff2;
            color: #000;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="status-display">System: Tap "START AR" at the top</div>
        
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Enter 'clint1' or 'clint2'">
            <button id="send-btn">Switch Hologram</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer, clintMesh;
        const loader = new THREE.TextureLoader();
        const statusEl = document.getElementById('status-display');

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Create AR Button
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ui-layer') }
            }));

            // Plane Geometry for the Character
            const geometry = new THREE.PlaneGeometry(0.8, 1.2);
            const material = new THREE.MeshBasicMaterial({
                map: loader.load('clint1-founder-3.png'),
                transparent: true,
                side: THREE.DoubleSide
            });

            clintMesh = new THREE.Mesh(geometry, material);
            clintMesh.position.set(0, 0, -1.2); // 1.2 meters away
            clintMesh.visible = false;
            scene.add(clintMesh);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));

            const btn = document.getElementById('send-btn');
            const input = document.getElementById('user-input');

            // SMART LOADER: Tries different names to ensure it finds your file
            const tryLoad = (names, index) => {
                if (index >= names.length) {
                    statusEl.innerText = "Error: File Not Found!";
                    statusEl.style.color = "#ff4444";
                    return;
                }

                statusEl.innerText = "Connecting: " + names[index];
                loader.load(names[index], 
                    (tex) => {
                        clintMesh.material.map = tex;
                        clintMesh.visible = true;
                        statusEl.innerText = "Hologram Active: " + names[index];
                        statusEl.style.color = "#00ff00";
                    },
                    undefined,
                    () => tryLoad(names, index + 1)
                );
            };

            btn.onclick = () => {
                const val = input.value.toLowerCase().trim();
                let searchList = [];

                if (val.includes('clint1')) {
                    searchList = ['clint1-founder-3.png', 'clint1.png'];
                } else if (val.includes('clint2')) {
                    // EXACT MATCH for your "engineer" filename
                    searchList = [
                        'Clint2-engineer-3.png', 
                        'clint2-engineer-3.png', 
                        'clint2-engineer-3.PNG'
                    ];
                }

                if (searchList.length > 0) {
                    tryLoad(searchList, 0);
                } else {
                    statusEl.innerText = "Use 'clint1' or 'clint2'";
                }
            };

            renderer.setAnimationLoop(() => {
                if (renderer.xr.isPresenting) {
                   // Only show instructions once AR starts
                   if (statusEl.innerText.includes("START AR")) {
                       statusEl.innerText = "AR LIVE: Move phone to scan room";
                   }
                }
                renderer.render(scene, camera);
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
