<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clint AI - AR Hologram</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui-layer { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 10; display: flex; flex-direction: column; gap: 10px; align-items: center;
        }
        input { padding: 12px; border-radius: 8px; border: 2px solid #00ff88; background: rgba(0,0,0,0.8); color: white; width: 200px; }
        button { padding: 12px 24px; background: #00ff88; border: none; border-radius: 8px; font-weight: bold; color: black; cursor: pointer; }
   #ui-layer {
    position: absolute;
    bottom: 20px;
    left: 0;
    width: 100%;
    text-align: center;
    z-index: 10;
    pointer-events: none; 
}

#ui-layer input, #ui-layer button {
    pointer-events: auto; 
}

    </style>
</head>
<body>
    <div id="ui-layer">
        <input type="text" id="user-input" placeholder="Type 'clint1' or 'clint2'">
        <button id="send-btn">SWITCH CHARACTER</button>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
        import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Add the AR Button
        document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

        // --- 2. HOLOGRAPHIC MATERIAL ---
        const loader = new THREE.TextureLoader();
        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: { uTexture: { value: loader.load('clint1-founder-3.png') } },
            transparent: true,
            vertexShader: `
                varying vec2 vUv;
                void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
            `,
            fragmentShader: `
                uniform sampler2D uTexture;
                varying vec2 vUv;
                void main() {
                    vec4 color = texture2D(uTexture, vUv);
                    // Chroma key: removes dark backgrounds
                    if(dot(color.rgb, vec3(0.333)) < 0.1) discard; 
                    gl_FragColor = color;
                }
            `
        });

        const clintMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.8), shaderMaterial);
        clintMesh.visible = false; 
        clintMesh.matrixAutoUpdate = false; // Required for manual lerping
        scene.add(clintMesh);

        // --- 3. AR HIT TESTING & SMOOTH MOVEMENT ---
        let hitTestSource = null;
        let hitTestSourceRequested = false;

        renderer.setAnimationLoop((timestamp, frame) => {
            if (frame) {
                const session = renderer.xr.getSession();
                
                if (!hitTestSourceRequested) {
                    session.requestReferenceSpace('viewer').then((refSpace) => {
                        session.requestHitTestSource({ space: refSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitResults = frame.getHitTestResults(hitTestSource);
                    if (hitResults.length > 0) {
                        const hit = hitResults[0];
                        const pose = hit.getPose(renderer.xr.getReferenceSpace());

                        clintMesh.visible = true;
                        
                        // LERP (Linear Interpolation) for smooth walking
                        const targetMatrix = new THREE.Matrix4().fromArray(pose.transform.matrix);
                        clintMesh.matrix.lerp(targetMatrix, 0.05); 
                    }
                }
            }
            renderer.render(scene, camera);
        });

        // --- 4. INTERACTION ---
        document.getElementById('send-btn').onclick = () => {
            const val = document.getElementById('user-input').value.toLowerCase();
            if (val.includes('clint1')) {
                shaderMaterial.uniforms.uTexture.value = loader.load('clint1-founder-3.png');
            } else if (val.includes('clint2')) {
                shaderMaterial.uniforms.uTexture.value = loader.load('clint2-engineer-3.png');
            }
        };
    </script>
</body>
</html>
