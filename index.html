
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clint AI Hologram - Twins Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ARButton {
            top: 20px !important;
            bottom: auto !important;
            background: rgba(0, 255, 242, 0.4) !important;
            border: 2px solid #00fff2 !important;
        }
        #ui-layer {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            pointer-events: none;
        }
        #status-display {
            background: rgba(0, 0, 0, 0.8);
            color: #00fff2;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #00fff2;
        }
        .input-group {
            display: flex;
            gap: 5px;
            pointer-events: auto;
            width: 90%;
            max-width: 400px;
        }
        input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00fff2;
            background: #111;
            color: white;
        }
        button {
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: #00fff2;
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="status-display">Waking up the Twins...</div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Talk to the Twins...">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer, clintMesh;
        let activeCharacter = 'clint1'; 
        const loader = new THREE.TextureLoader();
        const statusEl = document.getElementById('status-display');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');

        // PRE-LOAD VOICES (Crucial for mobile to avoid female default)
        window.speechSynthesis.getVoices();

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.getElementById('ui-layer') }
            }));

            const geometry = new THREE.PlaneGeometry(0.8, 1.3);
            const material = new THREE.MeshBasicMaterial({
                map: loader.load('clint1-founder-3.png/Clint1-founder-3png_260329_122816.jpg'),
                transparent: true,
                side: THREE.DoubleSide
            });

            clintMesh = new THREE.Mesh(geometry, material);
            clintMesh.position.set(0, 0, -1.2);
            scene.add(clintMesh);

            scene.add(new THREE.AmbientLight(0xffffff, 1.5));

            btn.onclick = () => {
                const val = input.value.trim();
                if (val !== "") {
                    processCommand(val);
                    input.value = "";
                }
            };

            renderer.setAnimationLoop(() => {
                renderer.render(scene, camera);
            });

            statusEl.innerText = "Twins Ready - Type 'Clint 1' or 'Clint 2'";
        }

        function tryLoad(names, index) {
            if (index >= names.length) return;
            loader.load(names[index], (tex) => {
                clintMesh.material.map = tex;
                statusEl.innerText = "Hologram Switched";
            }, undefined, () => tryLoad(names, index + 1));
        }
        function hologramSpeak(text) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Re-fetch voices to ensure list isn't empty
            const voices = window.speechSynthesis.getVoices();
            
            // Find ALL male voices available on your phone
            const maleVoices = voices.filter(v => 
                v.lang.includes('en') && 
                (v.name.toLowerCase().includes('male') || 
                 v.name.toLowerCase().includes('david') || 
                 v.name.toLowerCase().includes('google uk english male'))
            );

            if (activeCharacter === 'clint1') {
                // FOUNDER: Deep & Authoritative
                utterance.voice = maleVoices[0] || voices[0];
                utterance.pitch = 0.70; 
                utterance.rate = 0.85;
            } else {
                // ENGINEER: Higher & Energetic
                utterance.voice = maleVoices[1] || maleVoices[0] || voices[0];
                utterance.pitch = 1.30; 
                utterance.rate = 1.05;
            }
            window.speechSynthesis.speak(utterance);
        }

        function processCommand(text) {
            const msg = text.toLowerCase();
            if (msg.includes("clint 1") || msg.includes("founder")) {
                activeCharacter = 'clint1';
                // FIXED PATH: Note the folder name before the slash
                tryLoad(['clint1-founder-3.png/Clint1-founder-3png_260329_122816.jpg'], 0);
                hologramSpeak("Founder mode active. Standing by.");
            } 
            else if (msg.includes("clint 2") || msg.includes("engineer")) {
                activeCharacter = 'clint2';
                // FIXED PATH: Note the folder name before the slash
                tryLoad(['clint2-engineer-3.png/clint2-engineer-3png_260329_122846.jpg'], 0);
                hologramSpeak("Yo! Engineer Clint here. Let's build.");
            } 
            else {
                hologramSpeak(text);
            }
        }
        
    </sript>
        </body>   
        </html>
