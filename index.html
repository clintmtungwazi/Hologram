
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clint Hologram AR</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }

        /* UI Layer - This centers everything and lets touches pass through */
        #ui-layer {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
            pointer-events: none; /* Container is "invisible" to touch */
        }

        /* Input and Button - These are clickable and neat */
        #ui-layer input, #ui-layer button {
            pointer-events: auto; /* Makes them solid to touch */
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #00fff2;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-family: sans-serif;
            width: 250px;
            text-align: center;
            outline: none;
        }

        #ui-layer button {
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <input type="text" id="user-input" placeholder="Type 'clint1' or 'clint2'">
        <button id="send-btn">Switch Character</button>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.128.0/build/three.module.js';
        import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer, clintMesh;
        let loader = new THREE.TextureLoader();

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // RENDERER SETUP - alpha: true is key for seeing the camera!
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // AR BUTTON
            document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] }));

            // HOLOGRAM SETUP
            const geometry = new THREE.PlaneGeometry(0.5, 0.7);
            const shaderMaterial = new THREE.MeshBasicMaterial({
                map: loader.load('clint1-founder-3.png'),
                transparent: true,
                side: THREE.DoubleSide
            });

            clintMesh = new THREE.Mesh(geometry, shaderMaterial);
            clintMesh.position.set(0, 0, -1); // Starts 1 meter in front
            clintMesh.visible = false; // Hidden until AR starts
            scene.add(clintMesh);

            // INTERACTION LOGIC
            const btn = document.getElementById('send-btn');
            const input = document.getElementById('user-input');

            btn.onclick = () => {
                const val = input.value.toLowerCase();
                if (val.includes('clint1')) {
                    clintMesh.material.map = loader.load('clint1-founder-3.png');
                } else if (val.includes('clint2')) {
                    clintMesh.material.map = loader.load('clint2-founder-3.png');
                }
                clintMesh.visible = true;
            };

            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                // Logic for tracking surfaces can go here later
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
